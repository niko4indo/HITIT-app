<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>HITIT</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ffffff">

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f7f7f7;
padding:20px;
}

h1{
font-size:32px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-top:20px;
}

.input{
width:100%;
padding:20px;
font-size:32px;
border:none;
background:#f5f5f5;
border-radius:16px;
text-align:center;
}

.buttons{
display:flex;
gap:12px;
margin-top:12px;
}

button{
border:none;
border-radius:16px;
padding:16px;
font-size:20px;
flex:1;
}

.plus{
background:#16a34a;
color:white;
}

.minus{
background:#111;
color:white;
}
</style>

</head>

<body>

<h1>HITIT</h1>

<div class="card">

<input
id="amount"
class="input"
placeholder="100"
inputmode="decimal"
>

<div class="buttons">
<button class="minus">-</button>
<button class="plus">+</button>
</div>

</div>

<script>

if('serviceWorker' in navigator){
navigator.serviceWorker.register('./sw.js');
}

</script>

</body>
</html>
